{% extends "base.html" %}
{% block title %}Login – DreamDrop{% endblock %}
{% block bottom_nav %}{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card glass fade-in" style="padding:28px">
    <div class="auth-logo">
      <img src="{{ logo_url }}" alt="{{ site_name }}" class="auth-logo-img">
      <div class="auth-logo-name">{{ site_name }}</div>
      <div class="auth-logo-tagline">✨ Shop. Earn. Win.</div>
    </div>

    <div id="authError" class="alert alert-error" style="display:none"></div>
    <div id="authSuccess" class="alert alert-success" style="display:none"></div>

    <!-- Google Login -->
    <button class="social-btn" id="googleBtn" style="margin-bottom:12px">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Continue with Google
    </button>

    <div class="auth-divider"><span>or login with email</span></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between">
          Password <a href="/forgot-password" style="color:var(--primary);font-weight:600;font-size:.8rem;text-decoration:none">Forgot?</a>
        </label>
        <div style="position:relative">
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" style="padding-right:44px">
          <button type="button" onclick="togglePw('password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.1rem;cursor:pointer">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn" data-original="Login">
        Login
      </button>
    </form>

    <p class="auth-link">Don't have an account? <a href="/register">Sign up free</a></p>
  </div>

  <!-- Native Banner Ad -->
  <div style="margin-top:20px;max-width:380px;width:100%">
    {{ ads.native_banner | safe }}
  </div>
</div>

<script>function togglePw(id){const el=document.getElementById(id);el.type=el.type==='password'?'text':'password';}</script>
<script type="module" src="/static/js/firebase-auth.js"></script>
{% endblock %}
