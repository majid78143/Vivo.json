{% extends "base.html" %}
{% block title %}Forgot Password – DreamDrop{% endblock %}
{% block bottom_nav %}{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card glass fade-in" style="padding:28px">
    <div class="auth-logo">
      <div style="font-size:3rem;margin-bottom:12px">🔐</div>
      <div class="auth-logo-name">Reset Password</div>
      <div class="auth-logo-tagline">Enter your email to receive a reset link</div>
    </div>

    <div id="authError" class="alert alert-error" style="display:none"></div>
    <div id="authSuccess" class="alert alert-success" style="display:none"></div>

    <form id="forgotForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@email.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="forgotBtn" data-original="Send Reset Link">
        Send Reset Link
      </button>
    </form>

    <p class="auth-link mt-16"><a href="/login">← Back to Login</a></p>
  </div>
</div>
<script type="module" src="/static/js/firebase-auth.js"></script>
{% endblock %}
