services:
  - type: web
    name: dreamdrop
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@dreamdrop.com
      - key: ADMIN_PASSWORD
        value: changeme123
      - key: DEBUG
        value: "false"
